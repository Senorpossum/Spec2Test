name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

permissions:
    contents: read
    pull-requests: read

jobs:
    lint:
        name: Lint & Format
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: |
                  npm install -g npm@9
                  if [ -f package-lock.json ]; then
                    npm ci || npm install
                  else
                    npm install
                  fi

            - name: ESLint
              run: npm run lint

            - name: Prettier check
              run: npm run format

            - name: TypeScript type check
              run: npm run typecheck

    test:
        name: Test (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [20, 22]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: |
                  npm install -g npm@9
                  if [ -f package-lock.json ]; then
                    npm ci || npm install
                  else
                    npm install
                  fi

            - name: Build
              run: npm run build

            - name: Run tests
              run: npm test

            - name: Upload coverage
              uses: codecov/codecov-action@v4
              if: matrix.node-version == 20
              with:
                  files: ./coverage/lcov.info
                  fail_ci_if_error: false

    build:
        name: Build & Verify
        runs-on: ubuntu-latest
        needs: [lint, test]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: |
                  npm install -g npm@9
                  if [ -f package-lock.json ]; then
                    npm ci || npm install
                  else
                    npm install
                  fi

            - name: Build
              run: npm run build

            - name: Verify dist output
              run: |
                  if [ ! -d "dist" ]; then
                    echo "ERROR: dist/ directory not found after build"
                    exit 1
                  fi
                  if [ ! -f "dist/index.js" ]; then
                    echo "ERROR: dist/index.js not found after build"
                    exit 1
                  fi
                  echo "Build output verified successfully"

            - name: Package check
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              run: npm pack --dry-run

    security:
        name: Security Audit
        runs-on: ubuntu-latest
        needs: [lint, test]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: |
                  npm install -g npm@9
                  if [ -f package-lock.json ]; then
                    npm ci || npm install
                  else
                    npm install
                  fi

            - name: Audit dependencies
              run: npm audit --production --audit-level=moderate

    npm-publish-check:
        name: NPM Publish Check
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        needs: [lint, test, build]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: |
                  npm install -g npm@9
                  if [ -f package-lock.json ]; then
                    npm ci || npm install
                  else
                    npm install
                  fi

            - name: Build
              run: npm run build

            - name: Dry-run publish
              run: npm publish --dry-run
